<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Indo Park Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; touch-action: none; }
        canvas { display: block; }

        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s; z-index: 100;
        }
        .screen.hidden { opacity: 0; pointer-events: none; }

        #menu-screen { background: linear-gradient(180deg, #1a0a2e 0%, #16213e 40%, #0f3460 100%); }

        .title {
            font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900;
            background: linear-gradient(45deg, #ff6b35, #f7c948, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px; letter-spacing: 2px;
        }
        .subtitle { color: #8892b0; font-size: clamp(0.8rem, 3vw, 1.1rem); margin-bottom: 30px; letter-spacing: 4px; text-transform: uppercase; }
        .best-display { color: #f7c948; font-size: 1.1rem; margin-bottom: 15px; }
        .btn {
            padding: 14px 48px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 700;
            border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px; margin: 8px;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff6b35, #f7c948); color: #1a0a2e;
            box-shadow: 0 8px 32px rgba(255,107,53,0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,107,53,0.6); }
        .btn-secondary {
            background: transparent; color: #64ffda; border: 2px solid #64ffda;
        }
        .btn-secondary:hover { background: rgba(100,255,218,0.1); }

        #select-screen { background: linear-gradient(180deg, #1a0a2e 0%, #16213e 100%); }
        .section-title { color: #64ffda; font-size: clamp(1rem, 4vw, 1.5rem); margin: 20px 0 15px; text-transform: uppercase; letter-spacing: 3px; }
        .selection-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 90vw; }
        .selection-item {
            width: clamp(70px, 18vw, 110px); height: clamp(70px, 18vw, 110px);
            border: 3px solid #3a4a6a; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.05);
            color: #ccd6f6; font-weight: 600; font-size: 0.85rem; text-align: center; padding: 8px;
        }
        .selection-item:hover { border-color: #64ffda; transform: scale(1.05); }
        .selection-item.selected { border-color: #f7c948; background: rgba(247,201,72,0.15); box-shadow: 0 0 24px rgba(247,201,72,0.3); }
        .selection-item .icon { font-size: clamp(1.8rem, 7vw, 2.8rem); margin-bottom: 4px; }
        .selection-item .name { font-size: 0.7rem; }

        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 16px 20px; pointer-events: none; z-index: 50;
        }
        .hud-left { display: flex; flex-direction: column; gap: 8px; }
        .hud-item {
            background: rgba(0,0,0,0.55); padding: 8px 18px; border-radius: 20px;
            color: white; font-weight: 700; font-size: clamp(0.85rem, 3vw, 1.1rem);
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12);
        }
        .hud-icon { margin-right: 6px; }
        #score-val { color: #f7c948; }
        #coins-val { color: #64ffda; }
        #powerup-icons { color: #ff6b35; font-size: 1.2rem; min-width: 60px; }
        .hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

        #gameover-screen { background: rgba(10,10,26,0.95); }
        .gameover-title { font-size: clamp(2rem, 10vw, 4rem); color: #ff6b35; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 5px; }
        .final-stats { display: flex; gap: 24px; margin: 24px 0; flex-wrap: wrap; justify-content: center; }
        .stat { text-align: center; color: #ccd6f6; }
        .stat-value { font-size: clamp(1.8rem, 7vw, 3rem); font-weight: 900; color: #64ffda; display: block; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #8892b0; }
        .new-best { color: #f7c948; font-size: 1.1rem; animation: pulse 1s infinite; margin: 10px 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a1a; display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 200; transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader { width: 56px; height: 56px; border: 4px solid rgba(100,255,218,0.2); border-top-color: #64ffda; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #64ffda; margin-top: 18px; font-size: 1.1rem; letter-spacing: 3px; }

        #tutorial-hint {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 20px;
            color: white; font-size: 0.95rem; pointer-events: none; z-index: 50;
            opacity: 0; transition: opacity 0.5s; text-align: center; white-space: nowrap;
        }
        #tutorial-hint.show { opacity: 1; }
        .tutorial-keys { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .key { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 6px; font-weight: bold; }

        /* Combo display */
        #combo-display {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: 900; color: #f7c948;
            pointer-events: none; z-index: 60; opacity: 0;
            text-shadow: 0 0 20px rgba(247,201,72,0.8);
            transition: opacity 0.3s;
        }
        #combo-display.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <div class="loading-text">LOADING...</div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="title">INDO PARK RUNNER</div>
        <div class="subtitle">Endless 3D Runner</div>
        <div class="best-display" id="best-display"></div>
        <button class="btn btn-primary" onclick="showSelect()">▶ PLAY</button>
        <button class="btn btn-secondary" onclick="toggleSound()" id="sound-btn">🔊 SOUND</button>
    </div>

    <div id="select-screen" class="screen hidden">
        <div class="section-title">Choose Character</div>
        <div class="selection-grid" id="char-grid"></div>
        <div class="section-title">Select City</div>
        <div class="selection-grid" id="city-grid"></div>
        <div style="margin-top: 30px;">
            <button class="btn btn-primary" onclick="startGame()">▶ START</button>
            <button class="btn btn-secondary" onclick="showMenu()">← BACK</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div class="hud-left">
            <div class="hud-item">🏃 <span id="dist-val">0m</span></div>
            <div class="hud-item">⭐ <span id="score-val">0</span></div>
        </div>
        <div class="hud-right">
            <div class="hud-item">🪙 <span id="coins-val">0</span></div>
            <div class="hud-item" id="powerup-icons"></div>
        </div>
    </div>

    <div id="combo-display"></div>

    <div id="tutorial-hint">
        <div>Swipe Up/Down or Keys to Jump/Slide • Left/Right to Switch Lanes</div>
        <div class="tutorial-keys">
            <span class="key">↑ Jump</span>
            <span class="key">↓ Slide</span>
            <span class="key">← →</span>
        </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <div class="gameover-title">GAME OVER</div>
        <div class="new-best hidden" id="new-best">🏆 NEW BEST!</div>
        <div class="final-stats">
            <div class="stat"><span class="stat-value" id="f-dist">0</span><span class="stat-label">Distance (m)</span></div>
            <div class="stat"><span class="stat-value" id="f-coins">0</span><span class="stat-label">Coins</span></div>
            <div class="stat"><span class="stat-value" id="f-score">0</span><span class="stat-label">Score</span></div>
        </div>
        <button class="btn btn-primary" onclick="restart()">↻ REPLAY</button>
        <button class="btn btn-secondary" onclick="showMenu()">🏠 MENU</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const CFG = {
        lanes: [-3.5, 0, 3.5],
        speed: 0.4,
        speedInc: 0.00004,
        maxSpeed: 1.2,
        jumpForce: 0.28,
        gravity: 0.012,
        groundY: 0,
        laneSwitchSpeed: 0.18,
        spawnDist: -120,
        despawnDist: 12,
        coinValue: 10,
        powerUpDuration: 9000,
        magnetRadius: 6
    };

    // ============================================================
    // CHARACTERS
    // ============================================================
    const CHARS = [
        { id: 'alex',   name: 'Alex',   color: 0xff6b35, skin: 0xffdbac, pants: 0x1a1a2e, icon: '🏃' },
        { id: 'riya',   name: 'Riya',   color: 0xe91e63, skin: 0xffdbac, pants: 0x880e4f, icon: '🏃‍♀️' },
        { id: 'kiran',  name: 'Kiran',  color: 0x2196f3, skin: 0xd4956a, pants: 0x0d47a1, icon: '🧑‍🦱' },
        { id: 'priya',  name: 'Priya',  color: 0x9c27b0, skin: 0xffdbac, pants: 0x4a148c, icon: '👩‍🦰' }
    ];

    // ============================================================
    // CITIES
    // ============================================================
    const CITIES = [
        { id: 'delhi',      name: 'Delhi',      road: 0x3d3d3d, fog: 0xffb74d,  sky: 0x87ceeb, accent: 0xff9800, bldA: 0xbcaaa4, bldB: 0xa1887f },
        { id: 'mumbai',     name: 'Mumbai',      road: 0x4a4a4a, fog: 0x4dd0e1,  sky: 0x29b6f6, accent: 0x00bcd4, bldA: 0x78909c, bldB: 0x607d8b },
        { id: 'bangalore',  name: 'Bangalore',   road: 0x454538, fog: 0x81c784,  sky: 0x4caf50, accent: 0x4caf50, bldA: 0x80cbc4, bldB: 0x4db6ac },
        { id: 'kolkata',    name: 'Kolkata',     road: 0x5d4e37, fog: 0x9575cd,  sky: 0x7e57c2, accent: 0x673ab7, bldA: 0x8d6e63, bldB: 0x6d4c41 }
    ];

    // ============================================================
    // GAME STATE
    // ============================================================
    let gs = {
        playing: false, dead: false,
        char: 'alex', city: 'delhi',
        dist: 0, score: 0, coins: 0,
        speed: CFG.speed, frame: 0,
        lane: 1, targetLane: 1,
        yVel: 0, isJumping: false, isSliding: false,
        powerUps: { shield: false, magnet: false, slowmo: false },
        puTimers: { shield: null, magnet: null, slowmo: null },
        best: parseInt(localStorage.getItem('ipr_best') || '0')
    };

    // ============================================================
    // AUDIO
    // ============================================================
    let actx = null, sfxOn = true, musicOn = false, mNodes = [];

    function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
    }

    function sfx(type) {
        if (!actx || !sfxOn) return;
        try {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            const n = actx.currentTime;
            switch (type) {
                case 'coin':
                    o.type = 'sine';
                    o.frequency.setValueAtTime(990, n);
                    o.frequency.exponentialRampToValueAtTime(1760, n + 0.08);
                    g.gain.setValueAtTime(0.25, n);
                    g.gain.exponentialRampToValueAtTime(0.01, n + 0.12);
                    o.start(n); o.stop(n + 0.12);
                    break;
                case 'jump':
                    o.type = 'square';
                    o.frequency.setValueAtTime(280, n);
                    o.frequency.exponentialRampToValueAtTime(560, n + 0.1);
                    g.gain.setValueAtTime(0.15, n);
                    g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                    o.start(n); o.stop(n + 0.1);
                    break;
                case 'slide':
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(200, n);
                    o.frequency.exponentialRampToValueAtTime(100, n + 0.15);
                    g.gain.setValueAtTime(0.1, n);
                    g.gain.exponentialRampToValueAtTime(0.01, n + 0.15);
                    o.start(n); o.stop(n + 0.15);
                    break;
                case 'die':
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(440, n);
                    o.frequency.exponentialRampToValueAtTime(80, n + 0.6);
                    g.gain.setValueAtTime(0.3, n);
                    g.gain.exponentialRampToValueAtTime(0.01, n + 0.6);
                    o.start(n); o.stop(n + 0.6);
                    break;
                case 'powerup':
                    o.type = 'sine';
                    o.frequency.setValueAtTime(440, n);
                    o.frequency.exponentialRampToValueAtTime(880, n + 0.1);
                    o.frequency.exponentialRampToValueAtTime(1320, n + 0.2);
                    g.gain.setValueAtTime(0.25, n);
                    g.gain.exponentialRampToValueAtTime(0.01, n + 0.3);
                    o.start(n); o.stop(n + 0.3);
                    break;
            }
        } catch(e) {}
    }

    function startMusic() {
        if (!actx || !sfxOn || musicOn) return;
        musicOn = true;
        try {
            const bass = actx.createOscillator(), bg = actx.createGain();
            bass.type = 'triangle'; bass.frequency.value = 110; bg.gain.value = 0.07;
            bass.connect(bg); bg.connect(actx.destination); bass.start();
            mNodes.push({ o: bass, g: bg });

            const mel = actx.createOscillator(), mg = actx.createGain();
            mel.type = 'sine'; mel.frequency.value = 440; mg.gain.value = 0.04;
            mel.connect(mg); mg.connect(actx.destination); mel.start();
            mNodes.push({ o: mel, g: mg });

            const notes = [440, 494, 523, 587, 523, 494, 440, 392];
            let ni = 0;
            setInterval(() => { if (!musicOn) return; mel.frequency.setValueAtTime(notes[ni % notes.length], actx.currentTime); ni++; }, 280);

            setInterval(() => {
                if (!musicOn) return;
                const n = actx.createOscillator(), ng = actx.createGain();
                n.type = 'square'; n.frequency.value = 8000 + Math.random() * 2000;
                ng.gain.setValueAtTime(0.015, actx.currentTime);
                ng.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04);
                n.connect(ng); ng.connect(actx.destination);
                n.start(); n.stop(actx.currentTime + 0.04);
            }, 220);
        } catch(e) {}
    }

    function stopMusic() {
        musicOn = false;
        mNodes.forEach(n => { try { n.o.stop(); } catch(e) {} });
        mNodes = [];
    }

    function toggleSound() {
        sfxOn = !sfxOn;
        document.getElementById('sound-btn').textContent = sfxOn ? '🔊 SOUND' : '🔇 MUTED';
        if (!sfxOn) stopMusic();
    }

    // ============================================================
    // THREE.JS SETUP — FORWARD-RUNNING CAMERA
    // ============================================================
    let scene, camera, renderer;
    let player, pHead, pBody, pArmL, pArmR, pLegL, pLegR, pTorso;
    let shieldMesh = null;
    let obstacles = [], coins = [], powerUps = [], particles = [], roadTiles = [], buildings = [];

    function init() {
        scene = new THREE.Scene();

        const cityCfg = CITIES.find(c => c.id === gs.city) || CITIES[0];
        scene.fog = new THREE.Fog(cityCfg.fog, 40, 100);
        scene.background = new THREE.Color(cityCfg.sky);

        // Camera behind and above player, looking forward (-Z)
        camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 5.5, 10);
        camera.lookAt(0, 2, -20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        // Lighting
        const amb = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(amb);

        const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
        sun.position.set(8, 20, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.set(1024, 1024);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 200;
        sun.shadow.camera.left = -30;
        sun.shadow.camera.right = 30;
        sun.shadow.camera.top = 30;
        sun.shadow.camera.bottom = -30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x87ceeb, 0.3);
        fill.position.set(-5, 10, 10);
        scene.add(fill);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        buildWorld();
        createPlayer();

        const best = localStorage.getItem('ipr_best') || '0';
        const be = document.getElementById('best-display');
        if (be) be.textContent = best > 0 ? `🏆 BEST: ${best}m` : '';

        setTimeout(() => document.getElementById('loading').classList.add('hidden'), 600);
        animate();
    }

    // ============================================================
    // WORLD BUILDING
    // ============================================================
    function buildWorld() {
        clearWorld();
        const cityCfg = CITIES.find(c => c.id === gs.city) || CITIES[0];

        // Road — tiled planes moving toward camera
        for (let i = 0; i < 8; i++) {
            const geo = new THREE.PlaneGeometry(14, 25);
            const mat = new THREE.MeshLambertMaterial({ color: cityCfg.road });
            const tile = new THREE.Mesh(geo, mat);
            tile.rotation.x = -Math.PI / 2;
            tile.position.z = -i * 25 + 12;
            tile.receiveShadow = true;
            scene.add(tile);
            roadTiles.push(tile);

            // Lane markings
            for (let l = 0; l < 3; l++) {
                const markGeo = new THREE.PlaneGeometry(0.2, 3);
                const markMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
                const mark = new THREE.Mesh(markGeo, markMat);
                mark.rotation.x = -Math.PI / 2;
                mark.position.set(CFG.lanes[l], 0.01, -i * 25 + 12);
                scene.add(mark);
                roadTiles.push(mark);
            }
        }

        // Sidewalks
        for (let side = -1; side <= 1; side += 2) {
            const swGeo = new THREE.PlaneGeometry(3, 200);
            const swMat = new THREE.MeshLambertMaterial({ color: cityCfg.bldA });
            const sw = new THREE.Mesh(swGeo, swMat);
            sw.rotation.x = -Math.PI / 2;
            sw.position.set(side * 8.5, 0.02, -80);
            sw.receiveShadow = true;
            scene.add(sw);
            roadTiles.push(sw);
        }

        // Buildings on both sides
        for (let z = 0; z > -200; z -= 12) {
            for (let side = -1; side <= 1; side += 2) {
                spawnBuilding(z + Math.random() * 6, side, cityCfg);
            }
        }

        // City name sign
        const signGeo = new THREE.PlaneGeometry(6, 1.2);
        const signMat = new THREE.MeshBasicMaterial({ color: cityCfg.accent });
        const sign = new THREE.Mesh(signGeo, signMat);
        sign.position.set(0, 5, -10);
        sign.rotation.x = -0.1;
        scene.add(sign);
    }

    function spawnBuilding(z, side, cityCfg) {
        const h = 10 + Math.random() * 25;
        const w = 7 + Math.random() * 10;
        const bldGeo = new THREE.BoxGeometry(w, h, 8 + Math.random() * 6);
        const col = Math.random() > 0.5 ? cityCfg.bldA : cityCfg.bldB;
        const bldMat = new THREE.MeshLambertMaterial({ color: col });
        const bld = new THREE.Mesh(bldGeo, bldMat);
        bld.position.set(side * (13 + Math.random() * 4), h / 2, z);
        bld.castShadow = true;
        bld.receiveShadow = true;
        scene.add(bld);
        buildings.push(bld);

        // Windows
        const wGeo = new THREE.PlaneGeometry(0.9, 1.3);
        for (let wy = 2.5; wy < h - 2; wy += 3.2) {
            for (let wx = -w / 2 + 1.5; wx < w / 2 - 1; wx += 2.5) {
                if (Math.random() > 0.25) {
                    const lit = Math.random() > 0.3;
                    const wMat = new THREE.MeshBasicMaterial({
                        color: lit ? 0xffff88 : 0x334455,
                        opacity: lit ? 0.85 : 0.6,
                        transparent: true
                    });
                    const win = new THREE.Mesh(wGeo, wMat);
                    win.position.set(
                        side * (13 + Math.random() * 4) + side * (-w / 2 - 0.1),
                        wy,
                        z + wx
                    );
                    if (side === -1) win.rotation.y = Math.PI;
                    scene.add(win);
                    buildings.push(win);
                }
            }
        }
    }

    function clearWorld() {
        [...roadTiles, ...buildings].forEach(o => scene.remove(o));
        roadTiles = []; buildings = [];
    }

    // ============================================================
    // PLAYER CHARACTER
    // ============================================================
    function createPlayer() {
        if (player) scene.remove(player);
        const ch = CHARS.find(c => c.id === gs.char) || CHARS[0];

        player = new THREE.Group();

        // Torso
        const torsoGeo = new THREE.BoxGeometry(0.7, 0.85, 0.4);
        const torsoMat = new THREE.MeshLambertMaterial({ color: ch.color });
        pTorso = new THREE.Mesh(torsoGeo, torsoMat);
        pTorso.position.y = 1.15;
        pTorso.castShadow = true;
        player.add(pTorso);

        // Head
        const headGeo = new THREE.SphereGeometry(0.28, 14, 14);
        const headMat = new THREE.MeshLambertMaterial({ color: ch.skin });
        pHead = new THREE.Mesh(headGeo, headMat);
        pHead.position.y = 1.85;
        pHead.castShadow = true;
        player.add(pHead);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.05, 6, 6);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-0.1, 1.88, 0.22);
        player.add(eyeL);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.1, 1.88, 0.22);
        player.add(eyeR);

        // Arms
        const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
        const armMat = new THREE.MeshLambertMaterial({ color: ch.skin });
        pArmL = new THREE.Mesh(armGeo, armMat);
        pArmL.position.set(-0.5, 1.1, 0);
        pArmL.castShadow = true;
        player.add(pArmL);
        pArmR = new THREE.Mesh(armGeo, armMat);
        pArmR.position.set(0.5, 1.1, 0);
        pArmR.castShadow = true;
        player.add(pArmR);

        // Legs (with pants)
        const legGeo = new THREE.BoxGeometry(0.25, 0.65, 0.25);
        const legMat = new THREE.MeshLambertMaterial({ color: ch.pants });
        pLegL = new THREE.Mesh(legGeo, legMat);
        pLegL.position.set(-0.18, 0.38, 0);
        pLegL.castShadow = true;
        player.add(pLegL);
        pLegR = new THREE.Mesh(legGeo, legMat);
        pLegR.position.set(0.18, 0.38, 0);
        pLegR.castShadow = true;
        player.add(pLegR);

        // Shoes
        const shoeGeo = new THREE.BoxGeometry(0.28, 0.15, 0.35);
        const shoeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
        shoeL.position.set(-0.18, 0.07, 0.05);
        player.add(shoeL);
        const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
        shoeR.position.set(0.18, 0.07, 0.05);
        player.add(shoeR);

        player.position.set(CFG.lanes[1], CFG.groundY, 0);
        scene.add(player);
    }

    // ============================================================
    // OBSTACLES
    // ============================================================
    function spawnObstacle() {
        const lane = Math.floor(Math.random() * 3);
        const type = Math.random();
        let obs;

        if (type < 0.35) {
            // Barrier / wall
            const geo = new THREE.BoxGeometry(2.8, 1.4, 0.6);
            const mat = new THREE.MeshLambertMaterial({ color: 0xff5722 });
            obs = new THREE.Mesh(geo, mat);
            obs.position.y = 0.7;
            obs.userData = { type: 'barrier', lane, h: 1.4 };

        } else if (type < 0.6) {
            // Train (tall)
            const geo = new THREE.BoxGeometry(2.4, 2.8, 1.2);
            const mat = new THREE.MeshLambertMaterial({ color: 0x37474f });
            obs = new THREE.Mesh(geo, mat);
            obs.position.y = 1.4;
            obs.userData = { type: 'train', lane, h: 2.8 };
            // Windows
            const wGeo = new THREE.PlaneGeometry(0.5, 0.5);
            const wMat = new THREE.MeshBasicMaterial({ color: 0x4fc3f7 });
            for (let i = -0.6; i <= 0.6; i += 0.6) {
                const w = new THREE.Mesh(wGeo, wMat);
                w.position.set(i, 1.5, 0.61);
                obs.add(w);
            }

        } else if (type < 0.78) {
            // Double barrier (must jump)
            const geo = new THREE.BoxGeometry(2.8, 0.55, 0.5);
            const mat = new THREE.MeshLambertMaterial({ color: 0xff9800 });
            obs = new THREE.Mesh(geo, mat);
            obs.position.y = 0.28;
            obs.userData = { type: 'lowbarrier', lane, h: 0.55 };

        } else {
            // Gap / pit
            const geo = new THREE.BoxGeometry(2.5, 0.15, 2.5);
            const mat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            obs = new THREE.Mesh(geo, mat);
            obs.position.y = -0.1;
            obs.userData = { type: 'gap', lane, h: 0 };
        }

        obs.position.x = CFG.lanes[lane];
        obs.position.z = CFG.spawnDist;
        obs.castShadow = true;
        scene.add(obs);
        obstacles.push(obs);
    }

    // ============================================================
    // COINS
    // ============================================================
    function spawnCoin(z, lane) {
        const g = new THREE.Group();
        const cGeo = new THREE.TorusGeometry(0.28, 0.08, 8, 20);
        const cMat = new THREE.MeshLambertMaterial({ color: 0xffd700, emissive: 0xaa8800, emissiveIntensity: 0.3 });
        const c = new THREE.Mesh(cGeo, cMat);
        c.rotation.y = Math.PI / 2;
        g.add(c);
        const iGeo = new THREE.CircleGeometry(0.18, 12);
        const iMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const inner = new THREE.Mesh(iGeo, iMat);
        inner.position.z = 0.05;
        g.add(inner);

        g.position.set(CFG.lanes[lane], 1.3, z);
        g.userData = { lane, collected: false };
        scene.add(g);
        coins.push(g);
    }

    function spawnCoinRow() {
        const lane = Math.floor(Math.random() * 3);
        const rows = 3 + Math.floor(Math.random() * 3);
        for (let i = 0; i < rows; i++) spawnCoin(CFG.spawnDist - i * 2.5, lane);
    }

    // ============================================================
    // POWER-UPS
    // ============================================================
    const PUTYPES = [
        { id: 'shield', color: 0x00ffff, icon: '🛡️' },
        { id: 'magnet', color: 0xff00ff, icon: '🧲' },
        { id: 'slowmo', color: 0xffff00, icon: '⏱️' }
    ];

    function spawnPowerUp() {
        const type = PUTYPES[Math.floor(Math.random() * PUTYPES.length)];
        const lane = Math.floor(Math.random() * 3);
        const g = new THREE.Group();

        const ringGeo = new THREE.TorusGeometry(0.6, 0.07, 8, 20);
        const ringMat = new THREE.MeshBasicMaterial({ color: type.color, opacity: 0.6, transparent: true });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        g.add(ring);

        const coreGeo = new THREE.OctahedronGeometry(0.38, 0);
        const coreMat = new THREE.MeshLambertMaterial({ color: type.color, emissive: type.color, emissiveIntensity: 0.5 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        g.add(core);

        g.position.set(CFG.lanes[lane], 1.8, CFG.spawnDist);
        g.userData = { lane, type: type.id, collected: false };
        scene.add(g);
        powerUps.push(g);
    }

    function activatePU(type) {
        sfx('powerup');
        gs.powerUps[type] = true;
        if (gs.puTimers[type]) clearTimeout(gs.puTimers[type]);
        if (type === 'shield') makeShield();
        gs.puTimers[type] = setTimeout(() => {
            gs.powerUps[type] = false;
            if (type === 'shield') removeShield();
            updPUHud();
        }, CFG.powerUpDuration);
        updPUHud();
    }

    function makeShield() {
        if (shieldMesh) removeShield();
        const geo = new THREE.SphereGeometry(1.3, 14, 14);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, opacity: 0.18, transparent: true, side: THREE.DoubleSide });
        shieldMesh = new THREE.Mesh(geo, mat);
        shieldMesh.position.copy(player.position);
        shieldMesh.position.y += 1;
        scene.add(shieldMesh);
    }

    function removeShield() {
        if (shieldMesh) { scene.remove(shieldMesh); shieldMesh = null; }
    }

    function updPUHud() {
        const el = document.getElementById('powerup-icons');
        if (!el) return;
        let html = '';
        if (gs.powerUps.shield) html += '🛡️';
        if (gs.powerUps.magnet) html += '🧲';
        if (gs.powerUps.slowmo) html += '⏱️';
        el.textContent = html;
    }

    // ============================================================
    // PARTICLES
    // ============================================================
    function burst(x, y, z, color, n = 10) {
        for (let i = 0; i < n; i++) {
            const geo = new THREE.SphereGeometry(0.07, 5, 5);
            const mat = new THREE.MeshBasicMaterial({ color });
            const p = new THREE.Mesh(geo, mat);
            p.position.set(x, y, z);
            p.userData = {
                vx: (Math.random() - 0.5) * 0.25,
                vy: Math.random() * 0.18 + 0.08,
                vz: (Math.random() - 0.5) * 0.25,
                life: 1.0
            };
            scene.add(p);
            particles.push(p);
        }
    }

    function updParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.position.x += p.userData.vx;
            p.position.y += p.userData.vy;
            p.position.z += p.userData.vz;
            p.userData.vy -= 0.009;
            p.userData.life -= 0.028;
            p.scale.setScalar(p.userData.life.clamp(0, 1));
            if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
        }
    }

    // ============================================================
    // ANIMATION HELPERS
    // ============================================================
    let runAngle = 0;

    function animRun(speedMult) {
        if (!player) return;
        runAngle += 0.22 * speedMult;

        if (gs.isSliding) {
            // Slide: crouch low
            pTorso.scale.y = 0.5;
            pTorso.position.y = 0.6;
            pHead.position.y = 1.1;
            pArmL.rotation.x = -1.2;
            pArmR.rotation.x = -1.2;
            pLegL.rotation.x = -1.4;
            pLegR.rotation.x = -1.4;
        } else {
            pTorso.scale.y = 1;
            pTorso.position.y = 1.15;
            pHead.position.y = 1.85;
            pArmL.rotation.x = Math.sin(runAngle) * 0.7;
            pArmR.rotation.x = Math.sin(runAngle + Math.PI) * 0.7;
            pLegL.rotation.x = Math.sin(runAngle + Math.PI) * 0.75;
            pLegR.rotation.x = Math.sin(runAngle) * 0.75;
        }

        if (shieldMesh) shieldMesh.position.copy(player.position).add(new THREE.Vector3(0, 1, 0));
    }

    // ============================================================
    // GAME UPDATE
    // ============================================================
    function update() {
        if (!gs.playing || gs.dead) return;
        gs.frame++;

        const sm = gs.powerUps.slowmo ? 0.5 : 1;
        gs.speed = Math.min(CFG.maxSpeed, gs.speed + CFG.speedInc * sm);
        gs.dist += gs.speed * sm;
        gs.score = Math.floor(gs.dist) + gs.coins * CFG.coinValue;

        // Lane switching
        const tx = CFG.lanes[gs.targetLane];
        player.position.x += (tx - player.position.x) * CFG.laneSwitchSpeed;

        // Jump physics
        if (gs.isJumping) {
            gs.yVel -= CFG.gravity * sm;
            player.position.y += gs.yVel * sm;
            if (player.position.y <= CFG.groundY) {
                player.position.y = CFG.groundY;
                gs.isJumping = false;
                gs.yVel = 0;
            }
        }

        // Slide
        // (isSliding is set by key/touch handlers)

        // Move world toward player (player runs forward = world moves toward camera)
        const move = gs.speed * sm;

        // Road tiles
        roadTiles.forEach(t => {
            t.position.z += move;
            if (t.position.z > 15) t.position.z -= 200;
        });

        // Buildings
        buildings.forEach(b => {
            b.position.z += move;
            if (b.position.z > 30) b.position.z -= 200;
        });

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.position.z += move;

            // Hit detection
            if (o.position.z > -2.5 && o.position.z < 3) {
                const dx = Math.abs(o.position.x - player.position.x);
                if (dx < 1.3) {
                    const py = player.position.y;
                    const oh = o.userData.h;
                    const ot = o.userData.type;

                    if (ot === 'gap') {
                        if (py < 0.4 && !gs.powerUps.shield) { die(); return; }
                    } else if (ot === 'lowbarrier') {
                        if (py < 0.9 && !gs.powerUps.shield) { die(); return; }
                    } else {
                        if (!gs.powerUps.shield) { die(); return; }
                    }
                }
            }

            if (o.position.z > CFG.despawnDist) { scene.remove(o); obstacles.splice(i, 1); }
        }

        // Coins
        for (let i = coins.length - 1; i >= 0; i--) {
            const c = coins[i];
            c.position.z += move;
            c.rotation.x += 0.12 * sm;

            // Magnet
            if (gs.powerUps.magnet && !c.userData.collected) {
                const dx = player.position.x - c.position.x;
                const dz = player.position.z - c.position.z;
                const d = Math.sqrt(dx*dx + dz*dz);
                if (d < CFG.magnetRadius && d > 0.05) {
                    c.position.x += (dx/d) * 0.35;
                    c.position.z += (dz/d) * 0.35;
                }
            }

            if (!c.userData.collected && c.position.z > -1.5 && c.position.z < 2.5) {
                const dx = Math.abs(c.position.x - player.position.x);
                if (dx < 1.6) {
                    c.userData.collected = true;
                    gs.coins++;
                    sfx('coin');
                    burst(c.position.x, c.position.y, c.position.z, 0xffd700, 8);
                    scene.remove(c); coins.splice(i, 1);
                    continue;
                }
            }

            if (c.position.z > CFG.despawnDist) { scene.remove(c); coins.splice(i, 1); }
        }

        // Power-ups
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pu = powerUps[i];
            pu.position.z += move;
            pu.rotation.y += 0.04 * sm;
            if (pu.children[0]) pu.children[0].rotation.z += 0.025;
            if (pu.children[1]) pu.children[1].rotation.y += 0.06;

            if (!pu.userData.collected && pu.position.z > -2 && pu.position.z < 3) {
                const dx = Math.abs(pu.position.x - player.position.x);
                if (dx < 1.6) {
                    pu.userData.collected = true;
                    activatePU(pu.userData.type);
                    burst(pu.position.x, pu.position.y, pu.position.z, PUTYPES.find(p => p.id === pu.userData.type).color, 16);
                    scene.remove(pu); powerUps.splice(i, 1);
                    continue;
                }
            }

            if (pu.position.z > CFG.despawnDist) { scene.remove(pu); powerUps.splice(i, 1); }
        }

        updParticles();
        animRun(sm);

        // Spawn
        if (gs.frame % 70 === 0) spawnObstacle();
        if (gs.frame % 130 === 0) spawnCoinRow();
        if (gs.frame % 900 === 0) spawnPowerUp();

        // Camera follows player lane slightly
        camera.position.x += (player.position.x * 0.25 - camera.position.x) * 0.05;

        // HUD
        document.getElementById('dist-val').textContent = Math.floor(gs.dist) + 'm';
        document.getElementById('score-val').textContent = gs.score;
        document.getElementById('coins-val').textContent = gs.coins;
    }

    function die() {
        gs.dead = true;
        gs.playing = false;
        sfx('die');
        stopMusic();
        burst(player.position.x, player.position.y + 1, player.position.z, 0xff0000, 20);
        if (shieldMesh) removeShield();

        const isNew = gs.dist > gs.best;
        if (isNew) {
            gs.best = Math.floor(gs.dist);
            localStorage.setItem('ipr_best', gs.best);
        }

        document.getElementById('hud').classList.add('hidden');
        document.getElementById('gameover-screen').classList.remove('hidden');
        document.getElementById('f-dist').textContent = Math.floor(gs.dist);
        document.getElementById('f-coins').textContent = gs.coins;
        document.getElementById('f-score').textContent = gs.score;
        document.getElementById('new-best').classList.toggle('hidden', !isNew);
    }

    // ============================================================
    // RENDER LOOP
    // ============================================================
    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    // ============================================================
    // CONTROLS
    // ============================================================
    function switchLane(dir) {
        if (!gs.playing) return;
        if (dir === 'left' && gs.targetLane > 0) { gs.targetLane--; }
        else if (dir === 'right' && gs.targetLane < 2) { gs.targetLane++; }
    }

    function jump() {
        if (!gs.playing || gs.isJumping || gs.isSliding) return;
        gs.isJumping = true;
        gs.yVel = CFG.jumpForce;
        sfx('jump');
    }

    function slide() {
        if (!gs.playing || gs.isJumping) return;
        gs.isSliding = true;
        sfx('slide');
        setTimeout(() => { gs.isSliding = false; }, 700);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft'  || e.key === 'a') switchLane('left');
        if (e.key === 'ArrowRight' || e.key === 'd') switchLane('right');
        if (e.key === 'ArrowUp'    || e.key === 'w') jump();
        if (e.key === 'ArrowDown'  || e.key === 's') slide();
        if (e.key === ' ' && gs.dead) restart();
    });

    let tx = 0, ty = 0;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
    document.addEventListener('touchend', e => {
        if (!gs.playing) return;
        const dx = e.changedTouches[0].clientX - tx;
        const dy = e.changedTouches[0].clientY - ty;
        if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) {
            if (dy < 0) jump();
            else slide();
        } else if (Math.abs(dx) > 30) {
            if (dx > 0) switchLane('right');
            else switchLane('left');
        }
    }, { passive: true });

    // ============================================================
    // UI FLOW
    // ============================================================
    function showMenu() {
        gs.playing = false; gs.dead = false;
        stopMusic();
        const best = localStorage.getItem('ipr_best') || '0';
        const be = document.getElementById('best-display');
        if (be) be.textContent = best > 0 ? `🏆 BEST: ${best}m` : '';
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('select-screen').classList.add('hidden');
        document.getElementById('gameover-screen').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('tutorial-hint').classList.remove('show');
        if (shieldMesh) removeShield();
    }

    function showSelect() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('select-screen').classList.remove('hidden');
        renderGrids();
    }

    function renderGrids() {
        document.getElementById('char-grid').innerHTML = CHARS.map(c =>
            `<div class="selection-item ${c.id === gs.char ? 'selected' : ''}" onclick="selChar('${c.id}')">
                <div class="icon">${c.icon}</div><div class="name">${c.name}</div>
            </div>`
        ).join('');
        document.getElementById('city-grid').innerHTML = CITIES.map(c =>
            `<div class="selection-item ${c.id === gs.city ? 'selected' : ''}" onclick="selCity('${c.id}')">
                <div class="icon">🏙️</div><div class="name">${c.name}</div>
            </div>`
        ).join('');
    }

    function selChar(id) { gs.char = id; renderGrids(); }
    function selCity(id) {
        gs.city = id;
        const cc = CITIES.find(c => c.id === id);
        if (scene) {
            scene.fog = new THREE.Fog(cc.fog, 40, 100);
            scene.background = new THREE.Color(cc.sky);
        }
        renderGrids();
    }

    function startGame() {
        initAudio();
        startMusic();

        gs.playing = true;
        gs.dead = false;
        gs.dist = 0; gs.score = 0; gs.coins = 0;
        gs.speed = CFG.speed;
        gs.frame = 0;
        gs.lane = 1; gs.targetLane = 1;
        gs.yVel = 0; gs.isJumping = false; gs.isSliding = false;
        gs.powerUps = { shield: false, magnet: false, slowmo: false };
        Object.values(gs.puTimers).forEach(t => clearTimeout(t));
        gs.puTimers = { shield: null, magnet: null, slowmo: null };

        // Clear scene objects
        obstacles.forEach(o => scene.remove(o)); obstacles = [];
        coins.forEach(c => scene.remove(c)); coins = [];
        powerUps.forEach(p => scene.remove(p)); powerUps = [];
        particles.forEach(p => scene.remove(p)); particles = [];
        if (shieldMesh) removeShield();

        buildWorld();
        createPlayer();

        document.getElementById('select-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        updPUHud();

        setTimeout(() => {
            document.getElementById('tutorial-hint').classList.add('show');
            setTimeout(() => document.getElementById('tutorial-hint').classList.remove('show'), 4500);
        }, 400);
    }

    function restart() {
        document.getElementById('gameover-screen').classList.add('hidden');
        startGame();
    }

    window.addEventListener('load', init);
    </script>
